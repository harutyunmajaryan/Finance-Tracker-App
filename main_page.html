<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Tracker App</title>
    <link rel="stylesheet" href="main_page.css">
</head>
<body>

    <div class="cosmos-bg"></div>

    <div class="welcome-text">
        <h1>Welcome to Your Financial Tracker App</h1>
        <h2>Here you can find everything you need</h2>
    </div>

    <div class="app-container">
        
        <nav class="nav-bar">
            <a href="main_page.html" class="nav-link dashboard">Dashboard</a>
            <a href="activity.html" class="nav-link activity">Activity</a>
            <a href="transaction.html" class="nav-link transactions">Transactions</a>
            <a href="history.html" class="nav-link history">History</a>
        </nav>

        <div class="main-content">
            
            <aside class="sidebar">
                <div class="info-card">
                    <h2 class="info-title">1000+</h2>
                    <p class="subinfo-text">Total users</p>
                </div>
                <div class="info-card">
                    <h2 class="info-title">500+</h2>
                    <p class="subinfo-text">Active users</p>
                </div>
                <div class="info-card">
                    <h2 class="info-title">250+</h2>
                    <p class="subinfo-text">New Users</p>
                </div>
                <div class="info-card">
                    <h2 class="info-title">320+</h2>
                    <p class="subinfo-text">Followers</p>
                </div>
            </aside>

            <main class="dashboard-info">
                <div class="balance-card">
                    <span class="balance-label">Current Balance</span>
                    <h3 class="balance-price">$0.00</h3>
                </div>

                <div class = "profit-card">
                    <span class = "profit-label">Current Profit</span>
                    <h3 class = "profit-price">+$0.00</h3>
                </div>

                <div class = "total-card">
                    <span class = "total-label"> Total Expenses</span>
                    <h3 class = "total-price">$0.00</h3>
                </div>
              

            </main> 

        </div>  
    </div>

</body>
</html>
