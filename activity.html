<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Activity</title>
    <link rel="stylesheet" href="activity.css">
    <script src="activity.js" defer></script>
</head>
<body>

    <div class="cosmos-bg"></div>

    <div class="app-container">
        
        <nav class="nav-bar">
            <a href="main_page.html" class="nav-link dashboard">Dashboard</a>
            <a href="activity.html" class="nav-link activity active">Activity</a>
            <a href="transaction.html" class="nav-link transactions">Transactions</a>
            <a href="history.html" class="nav-link history">History</a>
        </nav>

        <nav class="profile">Account Number: 90347859</nav>
        <nav class="profile2">Sort Code: 34 - 55 - 76</nav>

        <div class="main-content">
            
            <aside class="sidebar">
                <div class="info-card">
                    <h2 class="info-title">1000+</h2>
                    <p class="subinfo-text">Total users</p>
                </div>
                <div class="info-card">
                    <h2 class="info-title">500+</h2>
                    <p class="subinfo-text">Active users</p>
                </div>
                <div class="info-card">
                    <h2 class="info-title">250+</h2>
                    <p class="subinfo-text">New Users</p>
                </div>
                <div class="info-card">
                    <h2 class="info-title">320+</h2>
                    <p class="subinfo-text">Followers</p>
                </div>
            </aside>

            <main class="dashboard-info">
                
                <div class="kpi-grid">
                    <div class="balance-card">
                        <span class="balance-label">Current Balance</span>
                        <h3 class="balance-price" id="balance-price-value">$0.00</h3>
                    </div>

                    <div class="profit-card">
                        <span class="profit-label">Current Profit</span>
                        <h3 class="profit-price" id="profit-price-value">+$0.00</h3>
                    </div>

                    <div class="total-card">
                        <span class="total-label">Total Expenses</span>
                        <h3 class="total-price" id="total-price-value">$0.00</h3>
                    </div>
                </div>

                <div class="transactions-container">
                    
                    <div class="table-actions">
                        <div class="action-buttons-group">
                            <button class="btn-add-transaction" id="add-money">+ Add Money</button>
                            <button class="btn-withdraw-transaction" id="withdraw-money">- Withdraw Money</button>
                        </div>
                        <button class = "refresh" id = "refresh"> Refresh</button>
                        
                        <div class="search-box">
                            <input type="text" placeholder="Search activity... (e.g 6/20/2026)" id="tx-search"><button class = "search-button" id = "search-button">Search</button>
                        </div>
                    </div>

                    <div class="table-wrapper">
                        <button class = "clear-all" id = "clear-all"> Clear all</button>
                        <table class="transaction-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Type</th>
                                    <th>Account Details</th>
                                    <th>Reference</th>
                                    <th>Amount</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="transaction-rows"></tbody>
                        </table>
                    </div>

                </div> 

            </main> 

        </div>  
    </div>

</body>
</html>
